<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メニュー札ジェネレーター</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans JP",sans-serif;background:#f3f4f6;color:#1a1a1a;min-height:100vh}
.wrap{max-width:860px;margin:0 auto;padding:24px 16px}
h1{font-size:18px;font-weight:700;margin-bottom:4px}
.subtitle{font-size:12px;color:#666;margin-bottom:20px}
.card{background:white;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.field label{font-size:11px;color:#666;display:block;margin-bottom:4px}
.field input{width:100%;border:1px solid #ddd;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;transition:border-color .15s}
.field input:focus{outline:none;border-color:#888}
.eng-row{display:flex;gap:6px;align-items:flex-start}
.eng-row input{flex:1}
.gtrans-btn{flex-shrink:0;padding:7px 10px;border-radius:8px;border:1px solid #ddd;background:white;color:#555;cursor:pointer;font-size:11px;font-family:inherit;white-space:nowrap;line-height:1.5;text-align:center}
.gtrans-btn:hover{background:#f5f5f5}
.gtrans-hint{font-size:10px;color:#999;margin-top:3px}
.allergen-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-top:4px}
.allergen-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:6px 4px;border-radius:8px;border:2px solid transparent;transition:all .15s;background:#f9f9f9;user-select:none}
.allergen-item.on{background:#fff}
.allergen-icon-wrap{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .1s;padding:6px}
.allergen-icon-wrap svg{width:100%;height:100%;display:block;color:white}
.allergen-item.on .allergen-icon-wrap{transform:scale(1.08)}
.allergen-item span{font-size:9px;text-align:center;color:#555;line-height:1.2}
.theme-row{display:flex;gap:10px;margin-top:4px;align-items:center}
.theme-btn{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s;flex-shrink:0}
.theme-btn.on{outline:3px solid #333;outline-offset:2px}
.font-row{display:flex;border:1px solid #ddd;border-radius:8px;overflow:hidden;margin-top:4px}
.font-btn{flex:1;padding:8px 0;text-align:center;cursor:pointer;font-size:13px;background:white;color:#888;border:none;transition:all .15s;font-family:inherit;position:relative}
.font-btn:first-child{border-right:1px solid #ddd}
.font-btn.on{background:#1a1a1a;color:white;font-weight:500}
.font-btn.on::after{content:"✓";position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:11px}
.btn-row{display:flex;gap:8px;margin-top:16px;align-items:center}
.add-btn{padding:9px 18px;border-radius:8px;cursor:pointer;font-size:13px;border:1px solid #ddd;background:white;color:#1a1a1a;font-family:inherit;transition:all .15s}
.add-btn:hover{background:#f5f5f5}
.add-btn:active{transform:scale(.97)}
.print-btn{padding:9px 18px;border-radius:8px;cursor:pointer;font-size:13px;border:1px solid #1a1a1a;background:#1a1a1a;color:white;font-family:inherit;margin-left:auto;transition:all .15s}
.print-btn:hover{opacity:.85}
.section-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.section-title{font-size:13px;font-weight:500}
.count{font-size:12px;color:#999}
.item-mini{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#f7f7f7;border-radius:8px;margin-bottom:6px;font-size:12px}
.item-mini .dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.item-mini .del{cursor:pointer;color:#aaa;font-size:18px;line-height:1;flex-shrink:0}
.item-mini .del:hover{color:#333}
.item-mini .actions{margin-left:auto;display:flex;align-items:center;gap:4px;flex-shrink:0}
.item-mini .act-btn{cursor:pointer;font-size:10px;padding:3px 7px;border-radius:4px;border:1px solid #ddd;background:white;color:#555;font-family:inherit;transition:all .15s;white-space:nowrap}
.item-mini .act-btn:hover{background:#f0f0f0;color:#1a1a1a}
.item-mini .act-btn.del{border-color:transparent;background:none;font-size:16px;padding:0 4px;color:#aaa}
.item-mini .act-btn.del:hover{color:#333;background:none}
.preview-label{font-size:11px;color:#999;margin-bottom:8px}
.page-wrap{background:white;border:1px solid #e5e5e5;border-radius:6px;overflow:hidden;width:100%}
.page-wrap svg{display:block;width:100%;height:auto}

@media print{
  @page{size:A4 portrait;margin:0mm}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  body,html{margin:0;padding:0;background:white}
  .no-print{display:none!important}
  .wrap{padding:0;max-width:none;margin:0}
  .page-wrap{border:none;border-radius:0;width:197mm;height:291mm;overflow:hidden;page-break-after:avoid;page-break-inside:avoid}
  .page-wrap svg{width:197mm!important;height:291mm!important;display:block}
}

.toggle-wrap{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.toggle-track{width:36px;height:20px;border-radius:10px;background:#ddd;position:relative;transition:background .2s;flex-shrink:0}
.toggle-track.on{background:#1a1a1a}
.toggle-thumb{width:16px;height:16px;border-radius:50%;background:white;position:absolute;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toggle-track.on .toggle-thumb{left:18px}

.exp-theme-btn{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s;flex-shrink:0}
.exp-theme-btn.on{outline:3px solid #333;outline-offset:2px}
.exp-font-btn{flex:1;padding:7px 0;text-align:center;cursor:pointer;font-size:13px;background:white;color:#888;border:none;transition:all .15s;font-family:inherit;position:relative}
.exp-font-btn:first-child{border-right:1px solid #ddd}
.exp-font-btn.on{background:#1a1a1a;color:white;font-weight:500}
.exp-font-btn.on::after{content:"✓";position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11px}

@media (max-width: 600px) {
  /* レイアウト基本 */
  .wrap { padding: 12px 10px; }
  h1 { font-size: 15px; }
  .subtitle { font-size: 11px; margin-bottom: 14px; }
  .card { padding: 14px 12px; }

  /* テーマ+フォント行を縦積みに（1行目だけ） */
  div.row:first-of-type { grid-template-columns: 1fr; }

  /* メニュー名+英訳行を縦積みに */
  div.row:nth-of-type(2) { grid-template-columns: 1fr; }

  /* 説明POP内の行 */
  #explainPopSettings div.row { grid-template-columns: 1fr; }

  /* アレルゲン4列 */
  .allergen-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .allergen-icon-wrap { width: 40px; height: 40px; }
  .allergen-item span { font-size: 10px; }

  /* ボタン縦積み */
  .btn-row { flex-direction: column; gap: 8px; }
  .add-btn { width: 100%; text-align: center; padding: 12px; }
  .print-btn { width: 100%; text-align: center; padding: 12px; margin-left: 0; }

  /* フォントボタン */
  .font-btn { font-size: 12px; }
  .exp-font-btn { font-size: 12px; }

  /* Google翻訳ボタン */
  .gtrans-btn { font-size: 10px; padding: 6px 8px; }

  /* 追加済みリスト */
  .item-mini { font-size: 11px; }
  .item-mini .act-btn { font-size: 9px; padding: 2px 5px; }

  /* プレビュー */
  .preview-label { font-size: 11px; }
}
</style>
</head>

    <p class="subtitle">ビュッフェ用アレルゲン付きメニュー札 ／ A4縦・2列×5行・最大10枚</p>
    <div class="card">
      <div class="row">
        <div class="field">
          <label>テーマカラー</label>
          <div class="theme-row">
            <div class="theme-btn on" style="background:#42210B" data-color="#42210B" title="ノーマル" onclick="selectTheme(this)"></div>
            <div class="theme-btn" style="background:#000A46" data-color="#000A46" title="シック" onclick="selectTheme(this)"></div>
            <div class="theme-btn" style="background:#5EAA57" data-color="#5EAA57" title="グリーン" onclick="selectTheme(this)"></div>
            <div class="theme-btn" style="background:#EF9484" data-color="#EF9484" title="ナチュラル" onclick="selectTheme(this)"></div>
            <div class="theme-btn" style="background:#F77E1E" data-color="#F77E1E" title="エネルギッシュ" onclick="selectTheme(this)"></div>
            <div class="theme-btn" style="background:#3CBDDF" data-color="#3CBDDF" title="クール" onclick="selectTheme(this)"></div>
            <div class="theme-btn" style="background:#BB0000" data-color="#BB0000" title="パッション" onclick="selectTheme(this)"></div>
            <div class="theme-btn" style="background:#666666" data-color="#666666" title="モノクロ" onclick="selectTheme(this)"></div>
          </div>
        </div>
        <div class="field">
          <label>フォント</label>
          <div class="font-row">
            <button class="font-btn on" data-font="Noto Sans JP" onclick="selectFont(this)">ゴシック体</button>
            <button class="font-btn" data-font="Noto Serif JP" onclick="selectFont(this)">明朝体</button>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>メニュー名（必須・全角13文字まで）</label>
          <input type="text" id="name" placeholder="例：ホテル自慢のオムレツ" maxlength="13" oninput="updatePreview()">
        </div>
        <div class="field">
          <label>英訳（任意・半角38文字まで）</label>
          <div class="eng-row">
            <input type="text" id="engname" placeholder="例：The hotel's signature omelet" maxlength="38" oninput="updatePreview()">
            <button class="gtrans-btn" onclick="openGTrans()">Google<br>翻訳 ↗</button>
          </div>
          <div class="gtrans-hint">翻訳結果をコピーして上の欄に貼り付けてください</div>
        </div>
      </div>
      <div class="field" style="margin-bottom:14px">

let themeColor = '#42210B';
let fontFamily = 'Noto Sans JP';
let selectedAllergens = new Set();
let items = [];

let allergenMode = true;
let logoDataUrl = null;

function toggleAllergenMode() {
  allergenMode = !allergenMode;
  const track = document.getElementById('allergenToggleTrack');
  const label = document.getElementById('allergenToggleLabel');
  const allergenSection = document.getElementById('allergenSection');
  const logoSection = document.getElementById('logoSection');
  if (allergenMode) {
    track.classList.add('on');
    label.textContent = 'オン';
    allergenSection.style.display = '';
    logoSection.style.display = 'none';
  } else {
    track.classList.remove('on');
    label.textContent = 'オフ（ロゴ表示）';
    allergenSection.style.display = 'none';
    logoSection.style.display = '';
  }
  updatePreview();
}

function onLogoUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    logoDataUrl = ev.target.result;
    document.getElementById('logoPreview').src = logoDataUrl;
    document.getElementById('logoPreviewWrap').style.display = '';
    updatePreview();
  };
  reader.readAsDataURL(file);
}

function clearLogo() {
  logoDataUrl = null;
  document.getElementById('logoInput').value = '';
  document.getElementById('logoPreviewWrap').style.display = 'none';
  updatePreview();
}


// ===== 説明POP =====
let explainPopMode = false;
let explainThemeColor = '#42210B';
let explainFontFamily = 'Noto Sans JP';
let explainLogoDataUrl = null;

function toggleExplainPop() {
  explainPopMode = !explainPopMode;
  const track = document.getElementById('explainToggleTrack');
  const label = document.getElementById('explainToggleLabel');
  const settings = document.getElementById('explainPopSettings');
  track.classList.toggle('on', explainPopMode);
  label.textContent = explainPopMode ? 'オン' : 'オフ';
  settings.style.display = explainPopMode ? '' : 'none';
}

function selectExplainTheme(el) {
  document.querySelectorAll('.exp-theme-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  explainThemeColor = el.dataset.color;
}

function selectExplainFont(el) {
  document.querySelectorAll('.exp-font-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  explainFontFamily = el.dataset.font;
}

function onExplainLogoUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    explainLogoDataUrl = ev.target.result;
    document.getElementById('explainLogoPreview').src = explainLogoDataUrl;
    document.getElementById('explainLogoPreviewWrap').style.display = '';
  };
  reader.readAsDataURL(file);
}

function clearExplainLogo() {
  explainLogoDataUrl = null;
  document.getElementById('explainLogoInput').value = '';
  document.getElementById('explainLogoPreviewWrap').style.display = 'none';
}

function printExplainPop() {
  const col = explainThemeColor;
  const ff  = explainFontFamily;
  // A5縦: 148mm x 210mm → 559 x 794px (96dpi)
  const W = 559, H = 794;

  const ALLERGEN_DATA = [
    {id:'egg',       ja:'卵',     en:'Eggs'},
    {id:'milk',      ja:'乳',     en:'Milk'},
    {id:'wheat',     ja:'小麦',   en:'Wheat'},
    {id:'buckwheat', ja:'そば',   en:'Buckwheat'},
    {id:'peanut',    ja:'落花生', en:'Peanuts'},
    {id:'shrimp',    ja:'えび',   en:'Shrimp'},
    {id:'crub',      ja:'かに',   en:'Crab'},
    {id:'walnut',    ja:'くるみ', en:'Walnuts'},
  ];

  // ── レイアウト定義（px）──────────────────
  //  [余白TOP] [ヘッダーバー] [余白] [メッセージ] [余白] [アイコン] [余白] [注意事項] [余白] [区切線] [ロゴ] [余白]
  const padTop    = 18;   // 上余白（白）
  const hdrH      = 86;   // ヘッダーバー
  const gapAB     = 36;   // ヘッダー〜メッセージ間
  const msgH      = 108;  // メッセージブロック高さ
  const gapBC     = 38;   // メッセージ〜アイコン間
  const iconAreaH = 148;  // アイコンブロック（背景帯）高さ
  const gapCD     = 38;   // アイコン〜注意事項間
  const noteH     = 172;  // 注意事項ブロック高さ
  const gapDE     = 16;   // 注意事項〜区切線間
  const lineH_px  = 1;    // 区切線
  const gapEF     = 16;   // 区切線〜ロゴ間
  const logoH     = 38;   // ロゴ高さ
  const padBot    = 18;   // 下余白

  const totalH = padTop+hdrH+gapAB+msgH+gapBC+iconAreaH+gapCD+noteH+gapDE+lineH_px+gapEF+logoH+padBot;
  // totalHがHを超える場合は各gapを比例縮小
  const scale = Math.min(1, H / totalH);

  // Y座標を順番に積み上げ
  let y = padTop * scale;
  const yHdr   = y; y += hdrH * scale;
  const yMsg   = y + gapAB * scale; y = yMsg + msgH * scale;
  const yIcon  = y + gapBC * scale; y = yIcon + iconAreaH * scale;
  const yNote  = y + gapCD * scale; y = yNote + noteH * scale;
  const yLine  = y + gapDE * scale; y = yLine + lineH_px;
  const yLogo  = y + gapEF * scale;

  let svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">';
  svg += '<rect width="' + W + '" height="' + H + '" fill="white"/>';

  // ── A. ヘッダーバー ──────────────────────
  const hdrScaled = hdrH * scale;
  svg += '<rect x="0" y="' + yHdr + '" width="' + W + '" height="' + hdrScaled + '" fill="' + col + '"/>';
  svg += '<text x="' + (W/2) + '" y="' + (yHdr + hdrScaled*0.50) + '" text-anchor="middle" font-size="28" font-weight="700" font-family="' + ff + '" fill="white">アレルゲン表示について</text>';
  svg += '<text x="' + (W/2) + '" y="' + (yHdr + hdrScaled*0.80) + '" text-anchor="middle" font-size="13" font-family="' + ff + '" fill="rgba(255,255,255,0.80)">Regarding Allergen Labeling</text>';

  // ── B. メッセージブロック ─────────────────
  const msgScaled = msgH * scale;
  const msgMid    = yMsg + msgScaled / 2;
  svg += '<text x="' + (W/2) + '" y="' + (msgMid - 30) + '" text-anchor="middle" font-size="15.5" font-weight="700" font-family="' + ff + '" fill="#1a1a1a">アレルギーをお持ちのお客様に安心してお食事いただけるよう、</text>';
  svg += '<text x="' + (W/2) + '" y="' + (msgMid - 8)  + '" text-anchor="middle" font-size="15.5" font-weight="700" font-family="' + ff + '" fill="#1a1a1a">全メニューに特定原材料8品目のアレルゲン表示を行っております。</text>';
  svg += '<text x="' + (W/2) + '" y="' + (msgMid + 22) + '" text-anchor="middle" font-size="12" font-family="' + ff + '" fill="#555">To ensure that guests with food allergies can dine with confidence,</text>';
  svg += '<text x="' + (W/2) + '" y="' + (msgMid + 40) + '" text-anchor="middle" font-size="12" font-family="' + ff + '" fill="#555">all menu items are labeled with the eight specified allergens.</text>';

  // ── C. アイコンブロック ──────────────────
  const iconAreaScaled = iconAreaH * scale;
  svg += '<rect x="0" y="' + yIcon + '" width="' + W + '" height="' + iconAreaScaled + '" fill="' + col + '15"/>';

  const PAD    = 24;
  const iconSz = 52;
  const iconGap = (W - PAD*2 - iconSz*8) / 7;
  const iconY  = yIcon + (iconAreaScaled - iconSz - 30) / 2;
  const jaFZ   = 13;
  const enFZ   = 10.5;
  const r      = Math.round(iconSz * 0.18);

  ALLERGEN_DATA.forEach(function(a, i) {
    const ix = PAD + i * (iconSz + iconGap);
    svg += '<rect x="' + ix + '" y="' + iconY + '" width="' + iconSz + '" height="' + iconSz + '" fill="' + col + '" rx="' + r + '" ry="' + r + '"/>';
    const pad2  = iconSz * 0.1;
    const inner = (SVG_ICONS[a.id] || '')
      .replace(/<svg[^>]*>/, '').replace(/<\/svg>/, '')
      .replace(/fill:currentColor/g, 'fill:white')
      .replace(/fill="currentColor"/g, 'fill="white"');
    svg += '<svg x="' + (ix+pad2) + '" y="' + (iconY+pad2) + '" width="' + (iconSz-pad2*2) + '" height="' + (iconSz-pad2*2) + '" viewBox="0 0 283.5 283.5">' + inner + '</svg>';
    svg += '<text x="' + (ix+iconSz/2) + '" y="' + (iconY+iconSz+jaFZ+4) + '" text-anchor="middle" font-size="' + jaFZ + '" font-weight="700" font-family="' + ff + '" fill="' + col + '">' + a.ja + '</text>';
    svg += '<text x="' + (ix+iconSz/2) + '" y="' + (iconY+iconSz+jaFZ+enFZ+9) + '" text-anchor="middle" font-size="' + enFZ + '" font-weight="700" font-family="' + ff + '" fill="' + col + '">' + a.en + '</text>';
  });

  // ── D. 注意事項ブロック ──────────────────
  const noteJaFZ  = 12.5;
  const noteEnFZ  = 10;
  const noteGap   = 40;   // 各注意事項の行間

  svg += '<text x="' + PAD + '" y="' + (yNote + 22) + '" font-size="14" font-weight="700" font-family="' + ff + '" fill="' + col + '">【注意事項 / Important Note】</text>';

  const notes = [
    {ja:'同じ調理器具を使用しているため、微量のアレルゲンが混入する可能性があります。', en:'Trace allergens may be present due to shared cooking utensils.'},
    {ja:'メニューの内容は仕入れ状況により変更となる場合がございます。',               en:'Menu items are subject to change depending on ingredient availability.'},
    {ja:'アレルギーに関するご不明点は、スタッフまでお気軽にお申し付けください。',       en:'Please feel free to ask our staff if you have any allergy-related concerns.'},
  ];
  notes.forEach(function(n, i) {
    const ny = yNote + 48 + i * noteGap;
    svg += '<text x="' + (PAD+4) + '" y="' + ny + '" font-size="' + noteJaFZ + '" font-family="' + ff + '" fill="#222">・' + n.ja + '</text>';
    svg += '<text x="' + (PAD+16) + '" y="' + (ny + noteJaFZ + 5) + '" font-size="' + noteEnFZ + '" font-family="' + ff + '" fill="#777">' + n.en + '</text>';
  });

  // ── E. 区切り線 ─────────────────────────
  svg += '<line x1="' + PAD + '" y1="' + yLine + '" x2="' + (W-PAD) + '" y2="' + yLine + '" stroke="' + col + '" stroke-width="0.8" opacity="0.3"/>';

  // ── F. ロゴ ──────────────────────────────
  if (explainLogoDataUrl) {
    const lH = logoH * scale;
    const lW = Math.min(lH * 4, W - PAD*4);
    svg += '<image href="' + explainLogoDataUrl + '" x="' + ((W-lW)/2) + '" y="' + yLogo + '" width="' + lW + '" height="' + lH + '" preserveAspectRatio="xMidYMid meet"/>';
  }

  svg += '</svg>';

  const win = window.open('', '_blank');
  win.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet"><style>@page{size:A5 portrait;margin:0}*{margin:0;padding:0;box-sizing:border-box}body{width:148mm;height:210mm;overflow:hidden}svg{width:148mm;height:210mm;display:block}@media print{body{width:148mm;height:210mm}}
@media (max-width: 600px) {
  /* レイアウト基本 */
  .wrap { padding: 12px 10px; }
  h1 { font-size: 15px; }
  .subtitle { font-size: 11px; margin-bottom: 14px; }
  .card { padding: 14px 12px; }

  /* テーマ+フォント行を縦積みに（1行目だけ） */
  div.row:first-of-type { grid-template-columns: 1fr; }

  /* メニュー名+英訳行を縦積みに */
  div.row:nth-of-type(2) { grid-template-columns: 1fr; }

  /* 説明POP内の行 */
  #explainPopSettings div.row { grid-template-columns: 1fr; }

  /* アレルゲン4列 */
  .allergen-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .allergen-icon-wrap { width: 40px; height: 40px; }
  .allergen-item span { font-size: 10px; }

  /* ボタン縦積み */
  .btn-row { flex-direction: column; gap: 8px; }
  .add-btn { width: 100%; text-align: center; padding: 12px; }
  .print-btn { width: 100%; text-align: center; padding: 12px; margin-left: 0; }

  /* フォントボタン */
  .font-btn { font-size: 12px; }
  .exp-font-btn { font-size: 12px; }

  /* Google翻訳ボタン */
  .gtrans-btn { font-size: 10px; padding: 6px 8px; }

  /* 追加済みリスト */
  .item-mini { font-size: 11px; }
  .item-mini .act-btn { font-size: 9px; padding: 2px 5px; }

  /* プレビュー */
  .preview-label { font-size: 11px; }
}
</style></head><body>' + svg + '</body></html>');
  win.document.close();
  setTimeout(() => win.print(), 800);
}
// ===== 説明POP END =====

function init() {
  // トグル初期状態（オン）
  document.getElementById('allergenToggleTrack').classList.add('on');
  const grid = document.getElementById('allergenGrid');
  ALLERGENS.forEach(a => {
    const div = document.createElement('div');
    div.className = 'allergen-item';
    div.id = 'btn_' + a.id;
    div.onclick = () => toggleAllergen(a.id);

    const wrap = document.createElement('div');
    wrap.className = 'allergen-icon-wrap';
    wrap.id = 'iconwrap_' + a.id;
    wrap.style.background = themeColor;
    // currentColorでSVGの色をwrapのcolorから継承させる
    wrap.style.color = 'white';
    wrap.innerHTML = SVG_ICONS[a.id] || '';
    div.appendChild(wrap);

    const span = document.createElement('span');
    span.textContent = a.label;
    div.appendChild(span);
    grid.appendChild(div);
  });
  updatePreview();
}

function updateAllergenColors() {
  ALLERGENS.forEach(a => {
    const wrap = document.getElementById('iconwrap_' + a.id);
    if (wrap) wrap.style.background = themeColor;
  });
  selectedAllergens.forEach(id => {
    const btn = document.getElementById('btn_' + id);
    if (btn) btn.style.borderColor = themeColor;
  });
}

function openGTrans() {
  const name = document.getElementById('name').value.trim();
  const q = encodeURIComponent(name || 'メニュー名を入力してください');
  window.open('https://translate.google.com/?sl=ja&tl=en&text=' + q, '_blank');
}

function toggleAllergen(id) {
  const el = document.getElementById('btn_' + id);
  if (selectedAllergens.has(id)) {
    selectedAllergens.delete(id);
    el.classList.remove('on');
    el.style.borderColor = 'transparent';
  } else {
    selectedAllergens.add(id);
    el.classList.add('on');
    el.style.borderColor = themeColor;
  }
  updatePreview();
}

function selectTheme(el) {
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  themeColor = el.dataset.color;
  updateAllergenColors();
  updatePreview();
}

function selectFont(el) {
  document.querySelectorAll('.font-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  fontFamily = el.dataset.font;
  updatePreview();
}

function getCurrentItem() {
  return {
    name: document.getElementById('name').value.trim(),
    engname: document.getElementById('engname').value.trim(),
    comment: document.getElementById('comment').value.trim(),
    allergens: new Set(selectedAllergens),
    themeColor, fontFamily,
    showAllergen: allergenMode,
    logoDataUrl: logoDataUrl
  };
}

function addItem() {
  const item = getCurrentItem();
  if (!item.name) { alert('メニュー名を入力してください'); return; }

  if (editingIndex >= 0) {
    // 編集モード：該当indexを上書き
    items[editingIndex] = item;
    editingIndex = -1;
    document.querySelector('.add-btn').textContent = '＋ このメニューを追加';
    document.querySelector('.add-btn').style.borderColor = '';
  } else {
    // 新規追加モード
    if (items.length >= 10) { alert('最大10枚まで追加できます'); return; }
    items.push(item);
  }

  renderItemList();
  document.getElementById('name').value = '';
  document.getElementById('engname').value = '';
  document.getElementById('comment').value = '';
  selectedAllergens = new Set();
  document.querySelectorAll('.allergen-item').forEach(el => {
    el.classList.remove('on');
    el.style.borderColor = 'transparent';
  });
  updatePreview();
}

function deleteItem(i) {
  items.splice(i, 1);
  renderItemList();
  updatePreview();
}

function duplicateItem(i) {
  if (items.length >= 10) { alert('最大10枚まで追加できます'); return; }
  const clone = Object.assign({}, items[i], { allergens: new Set(items[i].allergens) });
  items.splice(i + 1, 0, clone);
  renderItemList();
  updatePreview();
}

let editingIndex = -1;

function editItem(i) {
  const it = items[i];
  editingIndex = i;

  // フォームに値を復元
  document.getElementById('name').value = it.name || '';
  document.getElementById('engname').value = it.engname || '';
  document.getElementById('comment').value = it.comment || '';

  // テーマカラー復元
  document.querySelectorAll('.theme-btn').forEach(b => {
    b.classList.toggle('on', b.dataset.color === it.themeColor);
  });
  themeColor = it.themeColor;
  updateAllergenColors();

  // フォント復元
  document.querySelectorAll('.font-btn').forEach(b => {
    b.classList.toggle('on', b.dataset.font === it.fontFamily);
  });
  fontFamily = it.fontFamily;

  // アレルゲン復元
  selectedAllergens = new Set(it.allergens);
  document.querySelectorAll('.allergen-item').forEach(el => {
    const id = el.id.replace('btn_', '');
    el.classList.toggle('on', selectedAllergens.has(id));
    el.style.borderColor = selectedAllergens.has(id) ? themeColor : 'transparent';
  });

  // アレルゲンモード復元
  allergenMode = it.showAllergen !== false;
  const track = document.getElementById('allergenToggleTrack');
  const label = document.getElementById('allergenToggleLabel');
  const allergenSection = document.getElementById('allergenSection');
  const logoSection = document.getElementById('logoSection');
  if (allergenMode) {
    track.classList.add('on'); label.textContent = 'オン';
    allergenSection.style.display = ''; logoSection.style.display = 'none';
  } else {
    track.classList.remove('on'); label.textContent = 'オフ（ロゴ表示）';
    allergenSection.style.display = 'none'; logoSection.style.display = '';
  }

  // ロゴ復元
  logoDataUrl = it.logoDataUrl || null;
  if (logoDataUrl) {
    document.getElementById('logoPreview').src = logoDataUrl;
    document.getElementById('logoPreviewWrap').style.display = '';
  } else {
    document.getElementById('logoPreviewWrap').style.display = 'none';
  }

  // 追加ボタンを「更新」に変更
  document.querySelector('.add-btn').textContent = '✎ このメニューを更新';
  document.querySelector('.add-btn').style.borderColor = themeColor;

  window.scrollTo({ top: 0, behavior: 'smooth' });
  updatePreview();
}

function renderItemList() {
  document.getElementById('countBadge').textContent = items.length + ' / 10';
  const list = document.getElementById('itemList');
  if (items.length === 0) {
    list.innerHTML = '<p style="font-size:12px;color:#aaa">まだメニューが追加されていません</p>';
    return;
  }
  list.innerHTML = items.map((it, i) => `
    <div class="item-mini">
      <div class="dot" style="background:${it.themeColor}"></div>
      <span style="font-weight:500">${esc(it.name)}</span>
      <span style="color:#999;font-size:11px">${esc(it.engname)}</span>
      <div class="actions">
        <button class="act-btn" onclick="editItem(${i})" title="編集">✎ 編集</button>
        <button class="act-btn" onclick="duplicateItem(${i})" title="複製">⧉ 複製</button>
        <span class="act-btn del" onclick="deleteItem(${i})" title="削除">×</span>
      </div>
    </div>`).join('');
}

function updatePreview() {
  const cur = getCurrentItem();
  const all = items.length < 10 ? [...items, cur] : items;
  renderPage(all);
}

function renderPage(all) {
  const W = 743, H = 1103, PAD = 28, COLS = 2, ROWS = 5;
  const CW = (W - PAD * 2) / COLS;
  const CH = (H - PAD * 2) / ROWS;
  let c = `<rect width="${W}" height="${H}" fill="white"/>`;
  for (let r = 0; r < ROWS; r++) {
    for (let col = 0; col < COLS; col++) {
      const idx = r * COLS + col;
      const item = all[idx];
      const x = PAD + col * CW, y = PAD + r * CH;
      c += item
        ? card(item, x, y, CW, CH, idx >= items.length)
        : `<rect x="${x}" y="${y}" width="${CW}" height="${CH}" fill="#f5f5f5"/>`;
      if (col === 0) c += `<line x1="${x+CW}" y1="${y+6}" x2="${x+CW}" y2="${y+CH-6}" stroke="#ccc" stroke-width="0.6" stroke-dasharray="4,3"/>`;
      if (r < ROWS-1) c += `<line x1="${x+6}" y1="${y+CH}" x2="${x+CW-6}" y2="${y+CH}" stroke="#ccc" stroke-width="0.6" stroke-dasharray="4,3"/>`;
    }
  }
  document.getElementById('pageSvg').innerHTML = c;
}

function card(item, ox, oy, W, H, isPreview) {
  const col = item.themeColor || '#42210B';
  const ff  = item.fontFamily || 'Noto Sans JP';
  const als = ALLERGENS.map(a => a.id).filter(id => (item.allergens || new Set()).has(id));
  const op  = isPreview ? '0.45' : '1';

  const barH = H * 0.22;
  const botH = H * 0.30;
  const midH = H - barH - botH;

  let o = `<g opacity="${op}">`;
  o += `<rect x="${ox}" y="${oy}" width="${W}" height="${H}" fill="white"/>`;
  o += `<rect x="${ox}" y="${oy}" width="${W}" height="${barH}" fill="${col}"/>`;

  const bcy = oy + barH / 2;
  const cmt = esc(item.comment || '');
  if (cmt) {
    const fz = Math.min(W * 0.058, 16);
    o += `<text x="${ox+W/2}" y="${bcy+fz*0.38}" text-anchor="middle" font-size="${fz}" font-weight="400" font-family="${ff}" fill="white">${cmt}</text>`;
  } else {
    // コメントなし時は何も表示しない
  }

  const nameFZ = Math.min(W * 0.075, 22);
  const engFZ  = Math.min(W * 0.047, 14);
  const mc = oy + barH + midH / 2 + midH * 0.08;
  const ny = mc - engFZ * 0.9;
  const ey = ny + nameFZ * 1.2 + engFZ * 0.4;
  o += `<text x="${ox+W/2}" y="${ny}" text-anchor="middle" font-size="${nameFZ}" font-weight="700" font-family="${ff}" fill="#1a1a1a">${esc(item.name||'')}</text>`;
  o += `<text x="${ox+W/2}" y="${ey}" text-anchor="middle" font-size="${engFZ}" font-weight="400" font-family="${ff}" fill="#666">${esc(item.engname||'')}</text>`;

  const by = oy + barH + midH;
  o += `<rect x="${ox}" y="${by}" width="${W}" height="${botH}" fill="${col}18"/>`;

  const showAllergen = item.showAllergen !== false;

  if (!showAllergen) {
    // ロゴエリア背景を白に上書き
    o += `<rect x="${ox}" y="${by}" width="${W}" height="${botH}" fill="white"/>`;
    // ロゴ表示モード
    if (item.logoDataUrl) {
      const logoH = botH * 0.6;
      const logoW = logoH * 2.5; // アスペクト比概算
      o += `<image href="${item.logoDataUrl}" x="${ox+(W-logoW)/2}" y="${by+(botH-logoH)/2}" width="${logoW}" height="${logoH}" preserveAspectRatio="xMidYMid meet"/>`;
    } else {
      o += `<text x="${ox+W/2}" y="${by+botH/2+5}" text-anchor="middle" font-size="9" fill="${col}55" font-family="${ff}">ロゴ未設定</text>`;
    }
  } else if (als.length > 0) {
    const iconSz = Math.min(botH * 0.48, 38);
    const labelFZ = Math.min(iconSz * 0.27, 9);
    const gap = 6;
    const itemTotalH = iconSz + labelFZ + 5;
    const total = als.length * (iconSz + gap) - gap;
    let ix = ox + (W - total) / 2;
    const iy = by + (botH - itemTotalH) / 2;
    const radius = iconSz * 0.22; // ★ 角丸の半径

    als.forEach(id => {
      const a = ALLERGENS.find(x => x.id === id);
      if (!a || !SVG_ICONS[id]) return;

      // 角丸四角背景（テーマカラー）
      o += `<rect x="${ix}" y="${iy}" width="${iconSz}" height="${iconSz}" fill="${col}" rx="${radius}" ry="${radius}"/>`;

      // SVGアイコンをネストして白で描画（fill:currentColor → white指定）
      const pad = iconSz * 0.06;
      const innerSz = iconSz - pad * 2;
      // SVG内部のpath/polygon要素にfill="white"を直接付与
      let iconInner = SVG_ICONS[id]
        .replace(/^<svg[^>]*>/, '')
        .replace(/<\/svg>\s*$/, '')
        .replace(/fill:currentColor/g, 'fill:white')
        .replace(/fill="currentColor"/g, 'fill="white"');

      o += `<svg x="${ix+pad}" y="${iy+pad}" width="${innerSz}" height="${innerSz}" viewBox="0 0 283.5 283.5" xmlns="http://www.w3.org/2000/svg">${iconInner}</svg>`;

      // ラベル（アイコン下）
      o += `<text x="${ix+iconSz/2}" y="${iy+iconSz+labelFZ+1}" text-anchor="middle" font-size="${labelFZ}" font-family="${ff}" fill="${col}" font-weight="700">${a.label}</text>`;

      ix += iconSz + gap;
    });
  } else {
    const noAllergenFZ = Math.min(W * 0.042, 12);
    const noAllergenEngFZ = Math.min(W * 0.032, 9);
    o += `<text x="${ox+W/2}" y="${by+botH/2-4}" text-anchor="middle" font-size="${noAllergenFZ}" fill="${col}cc" font-family="${ff}" font-weight="700">アレルギー特定原材料8品目不使用</text>`;
    o += `<text x="${ox+W/2}" y="${by+botH/2+noAllergenEngFZ+4}" text-anchor="middle" font-size="${noAllergenEngFZ}" fill="${col}88" font-family="${ff}">Free from the 8 specified allergens.</text>`;
  }

  return o + '</g>';
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function doPrint() {
  const targets = items.length > 0 ? items : [getCurrentItem()];
  renderPage(targets);
  setTimeout(() => window.print(), 200);
}

init();
</script>
