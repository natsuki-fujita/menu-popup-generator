<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メニュー札ジェネレーター</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans JP",sans-serif;background:#f3f4f6;color:#1a1a1a;min-height:100vh}
.wrap{max-width:860px;margin:0 auto;padding:24px 16px}
h1{font-size:18px;font-weight:700;margin-bottom:4px}
.subtitle{font-size:12px;color:#666;margin-bottom:20px}
.card{background:white;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.field label{font-size:11px;color:#666;display:block;margin-bottom:4px}
.field input{width:100%;border:1px solid #ddd;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;transition:border-color .15s}
.field input:focus{outline:none;border-color:#888}
.eng-row{display:flex;gap:6px;align-items:flex-start}
.eng-row input{flex:1}
.gtrans-btn{flex-shrink:0;padding:7px 10px;border-radius:8px;border:1px solid #ddd;background:white;color:#555;cursor:pointer;font-size:11px;font-family:inherit;white-space:nowrap;line-height:1.5;text-align:center}
.gtrans-btn:hover{background:#f5f5f5}
.gtrans-hint{font-size:10px;color:#999;margin-top:3px}
.allergen-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-top:4px}
.allergen-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:6px 4px;border-radius:8px;border:2px solid transparent;transition:all .15s;background:#f9f9f9;user-select:none}
.allergen-item.on{background:#fff}
.allergen-icon-wrap{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .1s;padding:6px}
.allergen-icon-wrap svg{width:100%;height:100%;display:block;color:white}
.allergen-item.on .allergen-icon-wrap{transform:scale(1.08)}
.allergen-item span{font-size:9px;text-align:center;color:#555;line-height:1.2}
.theme-row{display:flex;gap:10px;margin-top:4px;align-items:center}
.theme-btn{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s;flex-shrink:0}
.theme-btn.on{outline:3px solid #333;outline-offset:2px}
.font-row{display:flex;border:1px solid #ddd;border-radius:8px;overflow:hidden;margin-top:4px}
.font-btn{flex:1;padding:8px 0;text-align:center;cursor:pointer;font-size:13px;background:white;color:#888;border:none;transition:all .15s;font-family:inherit;position:relative}
.font-btn:first-child{border-right:1px solid #ddd}
.font-btn.on{background:#1a1a1a;color:white;font-weight:500}
.font-btn.on::after{content:"✓";position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:11px}
.btn-row{display:flex;gap:8px;margin-top:16px;align-items:center}
.add-btn{padding:9px 18px;border-radius:8px;cursor:pointer;font-size:13px;border:1px solid #ddd;background:white;color:#1a1a1a;font-family:inherit;transition:all .15s}
.add-btn:hover{background:#f5f5f5}
.add-btn:active{transform:scale(.97)}
.print-btn{padding:9px 18px;border-radius:8px;cursor:pointer;font-size:13px;border:1px solid #1a1a1a;background:#1a1a1a;color:white;font-family:inherit;margin-left:auto;transition:all .15s}
.print-btn:hover{opacity:.85}
.section-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.section-title{font-size:13px;font-weight:500}
.count{font-size:12px;color:#999}
.item-mini{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#f7f7f7;border-radius:8px;margin-bottom:6px;font-size:12px}
.item-mini .dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.item-mini .del{margin-left:auto;cursor:pointer;color:#aaa;font-size:18px;line-height:1;flex-shrink:0}
.item-mini .del:hover{color:#333}
.preview-label{font-size:11px;color:#999;margin-bottom:8px}
.page-wrap{background:white;border:1px solid #e5e5e5;border-radius:6px;overflow:hidden;width:100%}
.page-wrap svg{display:block;width:100%;height:auto}

@media print{
  @page{size:A4 portrait;margin:0mm}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  body,html{margin:0;padding:0;background:white}
  .no-print{display:none!important}
  .wrap{padding:0;max-width:none;margin:0}
  .page-wrap{border:none;border-radius:0;width:197mm;height:291mm;overflow:hidden;page-break-after:avoid;page-break-inside:avoid}
  .page-wrap svg{width:197mm!important;height:291mm!important;display:block}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="no-print">
    <h1>メニュー札ジェネレーター</h1>
    <p class="subtitle">ホテルバイキング用アレルゲン付きメニュー札 ／ A4縦・2列×5行・最大10枚</p>
    <div class="card">
      <div class="row">
        <div class="field">
          <label>テーマカラー</label>
          <div class="theme-row">
            <div class="theme-btn on" style="background:#42210B" data-color="#42210B" title="ノーマル" onclick="selectTheme(this)"></div>
            <div class="theme-btn" style="background:#5EAA57" data-color="#5EAA57" title="グリーン" onclick="selectTheme(this)"></div>
            <div class="theme-btn" style="background:#EF9484" data-color="#EF9484" title="ナチュラル" onclick="selectTheme(this)"></div>
            <div class="theme-btn" style="background:#F77E1E" data-color="#F77E1E" title="エネルギッシュ" onclick="selectTheme(this)"></div>
          </div>
        </div>
        <div class="field">
          <label>フォント</label>
          <div class="font-row">
            <button class="font-btn on" data-font="Noto Sans JP" onclick="selectFont(this)">ゴシック体</button>
            <button class="font-btn" data-font="Noto Serif JP" onclick="selectFont(this)">明朝体</button>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>メニュー名（必須・全角12文字まで）</label>
          <input type="text" id="name" placeholder="例：ホテル自慢のオムレツ" maxlength="12" oninput="updatePreview()">
        </div>
        <div class="field">
          <label>英訳（半角30文字まで）</label>
          <div class="eng-row">
            <input type="text" id="engname" placeholder="例：The hotel's signature omelet" maxlength="30" oninput="updatePreview()">
            <button class="gtrans-btn" onclick="openGTrans()">Google<br>翻訳 ↗</button>
          </div>
          <div class="gtrans-hint">翻訳結果をコピーして上の欄に貼り付けてください</div>
        </div>
      </div>
      <div class="field" style="margin-bottom:14px">
        <label>おすすめコメント（任意・全角15文字まで・カラーバーに表示）</label>
        <input type="text" id="comment" placeholder="例：ふわふわに仕上げました" maxlength="15" oninput="updatePreview()">
      </div>
      <div class="field">
        <label>アレルゲン（該当するものをクリック）</label>
        <div class="allergen-grid" id="allergenGrid"></div>
      </div>
      <div class="btn-row">
        <button class="add-btn" onclick="addItem()">＋ このメニューを追加</button>
        <button class="print-btn" onclick="doPrint()">印刷・PDF出力 ↗</button>
      </div>
    </div>
    <div class="card">
      <div class="section-head">
        <span class="section-title">追加済みメニュー</span>
        <span class="count" id="countBadge">0 / 10</span>
      </div>
      <div id="itemList"><p style="font-size:12px;color:#aaa">まだメニューが追加されていません</p></div>
    </div>
    <p class="preview-label">A4レイアウトプレビュー（2列×5行・切り取り線あり）— 薄い枠が現在入力中のプレビュー</p>
  </div>
  <div class="page-wrap">
    <svg id="pageSvg" viewBox="0 0 743 1103" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>

const ALLERGENS = [
  {id:'egg',       label:'卵',     color:'#d59f3e'},
  {id:'milk',      label:'乳',     color:'#438cb6'},
  {id:'wheat',     label:'小麦',   color:'#9e6b36'},
  {id:'buckwheat', label:'そば',   color:'#77a770'},
  {id:'peanut',    label:'落花生', color:'#cc7d25'},
  {id:'shrimp',    label:'えび',   color:'#ca7c8d'},
  {id:'crub',      label:'かに',   color:'#c55e4c'},
  {id:'walnut',    label:'くるみ', color:'#9e7b5a'},
];

let themeColor = '#42210B';
let fontFamily = 'Noto Sans JP';
let selectedAllergens = new Set();
let items = [];

function init() {
  const grid = document.getElementById('allergenGrid');
  ALLERGENS.forEach(a => {
    const div = document.createElement('div');
    div.className = 'allergen-item';
    div.id = 'btn_' + a.id;
    div.onclick = () => toggleAllergen(a.id);

    const wrap = document.createElement('div');
    wrap.className = 'allergen-icon-wrap';
    wrap.id = 'iconwrap_' + a.id;
    wrap.style.background = themeColor;
    // currentColorでSVGの色をwrapのcolorから継承させる
    wrap.style.color = 'white';
    wrap.innerHTML = SVG_ICONS[a.id] || '';
    div.appendChild(wrap);

    const span = document.createElement('span');
    span.textContent = a.label;
    div.appendChild(span);
    grid.appendChild(div);
  });
  updatePreview();
}

function updateAllergenColors() {
  ALLERGENS.forEach(a => {
    const wrap = document.getElementById('iconwrap_' + a.id);
    if (wrap) wrap.style.background = themeColor;
  });
  selectedAllergens.forEach(id => {
    const btn = document.getElementById('btn_' + id);
    if (btn) btn.style.borderColor = themeColor;
  });
}

function openGTrans() {
  const name = document.getElementById('name').value.trim();
  const q = encodeURIComponent(name || 'メニュー名を入力してください');
  window.open('https://translate.google.com/?sl=ja&tl=en&text=' + q, '_blank');
}

function toggleAllergen(id) {
  const el = document.getElementById('btn_' + id);
  if (selectedAllergens.has(id)) {
    selectedAllergens.delete(id);
    el.classList.remove('on');
    el.style.borderColor = 'transparent';
  } else {
    selectedAllergens.add(id);
    el.classList.add('on');
    el.style.borderColor = themeColor;
  }
  updatePreview();
}

function selectTheme(el) {
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  themeColor = el.dataset.color;
  updateAllergenColors();
  updatePreview();
}

function selectFont(el) {
  document.querySelectorAll('.font-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  fontFamily = el.dataset.font;
  updatePreview();
}

function getCurrentItem() {
  return {
    name: document.getElementById('name').value.trim(),
    engname: document.getElementById('engname').value.trim(),
    comment: document.getElementById('comment').value.trim(),
    allergens: new Set(selectedAllergens),
    themeColor, fontFamily
  };
}

function addItem() {
  const item = getCurrentItem();
  if (!item.name) { alert('メニュー名を入力してください'); return; }
  if (items.length >= 10) { alert('最大10枚まで追加できます'); return; }
  items.push(item);
  renderItemList();
  document.getElementById('name').value = '';
  document.getElementById('engname').value = '';
  document.getElementById('comment').value = '';
  selectedAllergens = new Set();
  document.querySelectorAll('.allergen-item').forEach(el => {
    el.classList.remove('on');
    el.style.borderColor = 'transparent';
  });
  updatePreview();
}

function deleteItem(i) {
  items.splice(i, 1);
  renderItemList();
  updatePreview();
}

function renderItemList() {
  document.getElementById('countBadge').textContent = items.length + ' / 10';
  const list = document.getElementById('itemList');
  if (items.length === 0) {
    list.innerHTML = '<p style="font-size:12px;color:#aaa">まだメニューが追加されていません</p>';
    return;
  }
  list.innerHTML = items.map((it, i) => `
    <div class="item-mini">
      <div class="dot" style="background:${it.themeColor}"></div>
      <span style="font-weight:500">${esc(it.name)}</span>
      <span style="color:#999;font-size:11px">${esc(it.engname)}</span>
      <span class="del" onclick="deleteItem(${i})">×</span>
    </div>`).join('');
}

function updatePreview() {
  const cur = getCurrentItem();
  const all = items.length < 10 ? [...items, cur] : items;
  renderPage(all);
}

function renderPage(all) {
  const W = 743, H = 1103, PAD = 28, COLS = 2, ROWS = 5;
  const CW = (W - PAD * 2) / COLS;
  const CH = (H - PAD * 2) / ROWS;
  let c = `<rect width="${W}" height="${H}" fill="white"/>`;
  for (let r = 0; r < ROWS; r++) {
    for (let col = 0; col < COLS; col++) {
      const idx = r * COLS + col;
      const item = all[idx];
      const x = PAD + col * CW, y = PAD + r * CH;
      c += item
        ? card(item, x, y, CW, CH, idx >= items.length)
        : `<rect x="${x}" y="${y}" width="${CW}" height="${CH}" fill="#f5f5f5"/>`;
      if (col === 0) c += `<line x1="${x+CW}" y1="${y+6}" x2="${x+CW}" y2="${y+CH-6}" stroke="#ccc" stroke-width="0.6" stroke-dasharray="4,3"/>`;
      if (r < ROWS-1) c += `<line x1="${x+6}" y1="${y+CH}" x2="${x+CW-6}" y2="${y+CH}" stroke="#ccc" stroke-width="0.6" stroke-dasharray="4,3"/>`;
    }
  }
  document.getElementById('pageSvg').innerHTML = c;
}

function card(item, ox, oy, W, H, isPreview) {
  const col = item.themeColor || '#42210B';
  const ff  = item.fontFamily || 'Noto Sans JP';
  const als = [...(item.allergens || [])];
  const op  = isPreview ? '0.45' : '1';

  const barH = H * 0.22;
  const botH = H * 0.30;
  const midH = H - barH - botH;

  let o = `<g opacity="${op}">`;
  o += `<rect x="${ox}" y="${oy}" width="${W}" height="${H}" fill="white"/>`;
  o += `<rect x="${ox}" y="${oy}" width="${W}" height="${barH}" fill="${col}"/>`;

  const bcy = oy + barH / 2;
  const cmt = esc(item.comment || '');
  if (cmt) {
    const fz = Math.min(W * 0.058, 16);
    o += `<text x="${ox+W/2}" y="${bcy+fz*0.38}" text-anchor="middle" font-size="${fz}" font-weight="400" font-family="${ff}" fill="white">${cmt}</text>`;
  } else {
    o += `<text x="${ox+W/2}" y="${bcy+5}" text-anchor="middle" font-size="9" font-family="${ff}" fill="rgba(255,255,255,0.35)">コメントなし</text>`;
  }

  const nameFZ = Math.min(W * 0.075, 22);
  const engFZ  = Math.min(W * 0.047, 14);
  const mc = oy + barH + midH / 2 + midH * 0.08;
  const ny = mc - engFZ * 0.9;
  const ey = ny + nameFZ * 1.2 + engFZ * 0.4;
  o += `<text x="${ox+W/2}" y="${ny}" text-anchor="middle" font-size="${nameFZ}" font-weight="700" font-family="${ff}" fill="#1a1a1a">${esc(item.name||'')}</text>`;
  o += `<text x="${ox+W/2}" y="${ey}" text-anchor="middle" font-size="${engFZ}" font-weight="400" font-family="${ff}" fill="#666">${esc(item.engname||'')}</text>`;

  const by = oy + barH + midH;
  o += `<rect x="${ox}" y="${by}" width="${W}" height="${botH}" fill="${col}18"/>`;

  if (als.length > 0) {
    const iconSz = Math.min(botH * 0.48, 38);
    const labelFZ = Math.min(iconSz * 0.27, 9);
    const gap = 6;
    const itemTotalH = iconSz + labelFZ + 5;
    const total = als.length * (iconSz + gap) - gap;
    let ix = ox + (W - total) / 2;
    const iy = by + (botH - itemTotalH) / 2;
    const radius = iconSz * 0.22; // ★ 角丸の半径

    als.forEach(id => {
      const a = ALLERGENS.find(x => x.id === id);
      if (!a || !SVG_ICONS[id]) return;

      // 角丸四角背景（テーマカラー）
      o += `<rect x="${ix}" y="${iy}" width="${iconSz}" height="${iconSz}" fill="${col}" rx="${radius}" ry="${radius}"/>`;

      // SVGアイコンをネストして白で描画（fill:currentColor → white指定）
      const pad = iconSz * 0.06;
      const innerSz = iconSz - pad * 2;
      // SVG内部のpath/polygon要素にfill="white"を直接付与
      let iconInner = SVG_ICONS[id]
        .replace(/^<svg[^>]*>/, '')
        .replace(/<\/svg>\s*$/, '')
        .replace(/fill:currentColor/g, 'fill:white')
        .replace(/fill="currentColor"/g, 'fill="white"');

      o += `<svg x="${ix+pad}" y="${iy+pad}" width="${innerSz}" height="${innerSz}" viewBox="0 0 283.5 283.5" xmlns="http://www.w3.org/2000/svg">${iconInner}</svg>`;

      // ラベル（アイコン下）
      o += `<text x="${ix+iconSz/2}" y="${iy+iconSz+labelFZ+1}" text-anchor="middle" font-size="${labelFZ}" font-family="${ff}" fill="${col}" font-weight="700">${a.label}</text>`;

      ix += iconSz + gap;
    });
  } else {
    o += `<text x="${ox+W/2}" y="${by+botH/2+5}" text-anchor="middle" font-size="9" fill="${col}88" font-family="${ff}">アレルゲンなし</text>`;
  }

  return o + '</g>';
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function doPrint() {
  const targets = items.length > 0 ? items : [getCurrentItem()];
  renderPage(targets);
  setTimeout(() => window.print(), 200);
}

init();
</script>
</body>
